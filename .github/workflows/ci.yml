name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-gcc:
    name: Build (GCC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev
      - name: Configure
        run: cmake -B build -DCMAKE_C_COMPILER=gcc
      - name: Build
        run: cmake --build build
      - name: Test
        run: bash tests/run_tests.sh ./build/shell

  build-clang:
    name: Build (Clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev clang
      - name: Configure
        run: cmake -B build -DCMAKE_C_COMPILER=clang
      - name: Build
        run: cmake --build build
      - name: Test
        run: bash tests/run_tests.sh ./build/shell

  sanitizers:
    name: Build (Sanitizers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libreadline-dev
      - name: Configure with ASan + UBSan
        run: cmake -B build -DENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build
      - name: Test under sanitizers
        run: bash tests/run_tests.sh ./build/shell
